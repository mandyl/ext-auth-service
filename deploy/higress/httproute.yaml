apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: mcp-service-route
  namespace: backend
spec:
  parentRefs:
    - name: higress-gateway
      namespace: higress-system
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /api/v1
      backendRefs:
        - name: mcp-service
          port: 8080
    - matches:
        - path:
            type: Exact
            value: /health
      backendRefs:
        - name: mcp-service
          port: 8080

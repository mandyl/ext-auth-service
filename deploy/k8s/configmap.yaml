apiVersion: v1
kind: ConfigMap
metadata:
  name: ext-auth-tokens
  namespace: backend
data:
  tokens.yaml: |
    tokens:
      - value: "my-secret-token-001"
        user_id: "user_001"
        description: "测试用 Token"
        expires_at: 0
      - value: "my-secret-token-002"
        user_id: "user_002"
        description: "另一个测试 Token"
        expires_at: 0

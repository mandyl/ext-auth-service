apiVersion: apps/v1
kind: Deployment
metadata:
  name: ext-auth-service
  namespace: backend
  labels:
    app: ext-auth-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ext-auth-service
  template:
    metadata:
      labels:
        app: ext-auth-service
    spec:
      containers:
        - name: ext-auth-service
          image: mandyl/ext-auth-service:latest
          ports:
            - containerPort: 8090
          env:
            - name: PORT
              value: "8090"
            - name: TOKEN_CONFIG_PATH
              value: "/etc/ext-auth/tokens.yaml"
          volumeMounts:
            - name: token-config
              mountPath: /etc/ext-auth
          livenessProbe:
            httpGet:
              path: /health
              port: 8090
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: 8090
            initialDelaySeconds: 3
            periodSeconds: 5
      volumes:
        - name: token-config
          configMap:
            name: ext-auth-tokens
